name: Update Costco Gas Prices

on:
  schedule:
    - cron: "0 12 * * *"   # runs daily at 12:00 UTC (~7 AM Houston)
  workflow_dispatch:        # allows manual run

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run gas update script
        run: |
          python scripts/update_gas_prices.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data_clean/gas_prices_history.csv
          git commit -m "Automated gas price update" || echo "No changes"
          git push